# 测试环境 compose:自带 MySQL(宿主机端口 3307),支持两种启动模式。
#
# dev-local(只起数据库,后端/前端本地跑):
#   docker compose -f docker-compose.test.yml up -d mysql
#   后端:mvn spring-boot:run -pl backend -Dspring-boot.run.profiles=dev-local
#   前端:cd frontend/web && npm run dev
#
# dev-docker(全套容器,backend + frontend + mysql):
#   docker compose -f docker-compose.test.yml --profile docker up -d
#
# 数据清理(Flyway 重建表):
#   docker compose -f docker-compose.test.yml down -v
#
# mysql 未声明 profiles,两种模式都会启动;backend/frontend 声明 profiles:["docker"],
# 仅 dev-docker 模式(--profile docker)启动。一键操作见 scripts/dev.sh。
services:
  mysql:
    image: mysql:8.4
    container_name: ascoder-test-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${TEST_MYSQL_ROOT_PASSWORD:-test-password}
      MYSQL_DATABASE: ${TEST_MYSQL_DATABASE:-ascoder}
      MYSQL_USER: ${TEST_MYSQL_USER:-ascoder}
      MYSQL_PASSWORD: ${TEST_MYSQL_PASSWORD:-test-password}
    ports:
      - "${TEST_MYSQL_PORT:-3307}:3306"
    volumes:
      - ./data/mysql-test:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  backend:
    profiles: ["docker"]
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        APT_PROXY: ${APT_PROXY:-}
    container_name: ascoder-test-backend
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SPRING_PROFILES_ACTIVE: dev-docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${TEST_MYSQL_DATABASE:-ascoder}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: ${TEST_MYSQL_USER:-ascoder}
      SPRING_DATASOURCE_PASSWORD: ${TEST_MYSQL_PASSWORD:-test-password}
      LLM_PROVIDER: ${LLM_PROVIDER:-database}
      # Spring Boot env-to-property mapping: ASCODER_AGENT_MODEL_ID -> ascoder.agent.model-id
      ASCODER_AGENT_MODEL_ID: ${AGENT_MODEL_ID:-}
      ASCODER_AGENT_API_KEY: ${MINIMAX_API_KEY:-}
      ASCODER_AGENT_BASE_URL: ${AGENT_BASE_URL:-}
      ASCODER_AGENT_MAX_TOKENS: ${AGENT_MAX_TOKENS:-4000}
      ASCODER_AGENT_TIMEOUT_SECONDS: ${AGENT_TIMEOUT_SECONDS:-240}
      ASCODER_AGENT_TOOL_TIMEOUT_SECONDS: ${AGENT_TOOL_TIMEOUT_SECONDS:-300}
      ASCODER_AGENT_MAX_ITERS: ${AGENT_MAX_ITERS:-12}
      ASCODER_AGENT_SSE_TIMEOUT_SECONDS: ${AGENT_SSE_TIMEOUT_SECONDS:-600}
      ASCODER_AGENT_CODE_RESEARCHER_MAX_ITERS: ${AGENT_CODE_RESEARCHER_MAX_ITERS:-100}
      ASCODER_AGENT_IMPACT_ANALYZER_MAX_ITERS: ${AGENT_IMPACT_ANALYZER_MAX_ITERS:-8}
      ASCODER_AGENT_MODEL_MAX_ATTEMPTS: ${AGENT_MODEL_MAX_ATTEMPTS:-2}
      ASCODER_AGENT_TOOL_MAX_ATTEMPTS: ${AGENT_TOOL_MAX_ATTEMPTS:-1}
      ASCODER_AGENT_PLANNING_ENABLED: ${AGENT_PLANNING_ENABLED:-true}
      ASCODER_AGENT_PLAN_MAX_SUBTASKS: ${AGENT_PLAN_MAX_SUBTASKS:-10}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      REPO_ROOT: /app/data/repos
      WORKTREE_ROOT: /app/data/worktrees
      PROJECT_SPACE_ROOT: /app/data/project-spaces
      CODEGRAPH_ROOT: /app/data/codegraph
      CODEGRAPH_EXECUTABLE: codegraph
      CODEGRAPH_TIMEOUT_SECONDS: ${CODEGRAPH_TIMEOUT_SECONDS:-300}
      CODEGRAPH_INDEX_TIMEOUT_SECONDS: ${CODEGRAPH_INDEX_TIMEOUT_SECONDS:-3600}
      GIT_TIMEOUT_SECONDS: ${GIT_TIMEOUT_SECONDS:-120}
      GIT_TOKEN: ${GIT_TOKEN:-}
      GIT_USERNAME: ${GIT_USERNAME:-git}
      GIT_EXTRA_HOSTS: ${GIT_EXTRA_HOSTS:-}
      ASCODER_GIT_HTTP_PROXY: ${GIT_HTTP_PROXY:-}
      GIT_TLS_PROXY: ${GIT_TLS_PROXY:-}
      ASCODER_GIT_TLS_PROXY: ${GIT_TLS_PROXY:-}
      LOG_PATH: /app/logs
      JVM_OPTS: ${JVM_OPTS:--Xmx512m -Xms256m}
    volumes:
      - ./data/repos:/app/data/repos
      - ./data/worktrees:/app/data/worktrees
      - ./data/project-spaces:/app/data/project-spaces
      - ./data/codegraph:/app/data/codegraph
      - ./data/logs:/app/logs
      - ${HOME}/.ssh:/home/ascoder/.ssh:ro
    ports:
      - "${BACKEND_PORT:-18080}:18080"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:18080/api/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s

  frontend:
    profiles: ["docker"]
    build:
      context: ./frontend/web
      args:
        VITE_API_BASE_URL: ""
    container_name: ascoder-test-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${APP_PORT:-5173}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
