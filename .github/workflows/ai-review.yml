name: AI Code Review

on:
  pull_request:
    types: [opened, ready_for_review, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      HAS_KEY: ${{ secrets.LLM_API_KEY != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Anthropic SDK
        if: env.HAS_KEY == 'true'
        run: |
          cd .github/scripts
          npm init -y >/dev/null
          npm install --no-audit --no-fund @anthropic-ai/sdk

      - name: Run AI reviewer
        id: reviewer
        if: env.HAS_KEY == 'true'
        working-directory: .github/scripts
        env:
          HAS_KEY: 'true'
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          BASE_URL: ${{ vars.LLM_BASE_URL }}
          MODEL_ID: ${{ vars.LLM_MODEL_ID }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node ai-review.mjs

      - name: Post skip notice when secret missing
        if: env.HAS_KEY != 'true'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: ai-review-skipped
          message: |
            ⚠️ AI 代码评审已跳过：仓库未配置 `LLM_API_KEY` secret。
            请仓库管理员在 Settings → Secrets and variables → Actions → New repository secret
            添加 `LLM_API_KEY`（取值自你接入的 Anthropic 兼容 LLM 服务，例如
            https://api.minimaxi.com/anthropic）。
            可同时添加变量 `LLM_BASE_URL`（默认 `https://api.minimaxi.com/anthropic`）
            与 `LLM_MODEL_ID`（默认 `MiniMax-M3`）。
            本工作流可对接任意 Anthropic 兼容 provider。
