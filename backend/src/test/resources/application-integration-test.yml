# 集成测试 profile：连接 docker-compose.test.yml 启动的 MySQL（3307 端口）。
#
# 前置：docker compose -f docker-compose.test.yml up -d mysql
# 运行：ASCODER_INTEGRATION_TEST=true mvn test -pl backend -Dtest=TaskEngineIntegrationTests
#
# 与 dev-local 共用同一 docker MySQL 实例（ascoder 库），集成测试通过 @Transactional
# 或手动清理 asyncTasks 表保证隔离，不污染 dev-local 数据。
spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:${TEST_MYSQL_PORT:3307}/${TEST_MYSQL_DATABASE:ascoder}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${TEST_MYSQL_USER:ascoder}
    password: ${TEST_MYSQL_PASSWORD:test-password}
  jpa:
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    open-in-view: false
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

ascoder:
  prompt:
    source: file
  repo-root: ${REPO_ROOT:./data/repos}
  worktree-root: ${WORKTREE_ROOT:./data/worktrees}
  project-space-root: ${PROJECT_SPACE_ROOT:./data/project-spaces}
  codegraph-root: ${CODEGRAPH_ROOT:./data/codegraph}
  llm-provider: ${LLM_PROVIDER:database}
  encryption-key: ${ASCODER_ENCRYPTION_KEY:dGVzdC1lbmNyeXB0aW9uLWtleS1mb3ItaW50ZWdyYXRpb24tdGVzdHMtMTIzNDU2}
  codegraph:
    executable: ${CODEGRAPH_EXECUTABLE:codegraph}
    timeout-seconds: 300
    index-timeout-seconds: 3600
  git:
    timeout-seconds: 120
